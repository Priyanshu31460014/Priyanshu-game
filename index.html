<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE CHETS PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #1a1a1a;
    height: 100vh;
    overflow: hidden;
    color: #fff;
}

.app-container {
    display: flex;
    height: 100vh;
}

/* ============ SIDEBAR ============ */
.sidebar {
    width: 360px;
    background: #0d0d0d;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-header h1 {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
}

.sidebar-header .menu-btn {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 24px;
}

.search-box {
    width: 100%;
    padding: 10px 16px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 25px;
    font-size: 14px;
    outline: none;
    color: #fff;
    margin-bottom: 12px;
}

.search-box:focus {
    border-color: #25D366;
}

.search-box::placeholder {
    color: #666;
}

.chats-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
}

.chat-item {
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background .2s;
    display: flex;
    align-items: center;
    gap: 12px;
}

.chat-item:hover {
    background: #252525;
}

.chat-item.active {
    background: #1f4b3a;
}

.chat-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #25D366 0%, #128c5f 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
}

.chat-info {
    flex: 1;
    min-width: 0;
}

.chat-info h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    color: #fff;
}

.chat-info p {
    font-size: 13px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ============ CHAT SECTION ============ */
.chat-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0d0d0d;
}

.chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.chat-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.chat-header h2 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
}

.chat-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logout-btn {
    background: none;
    border: none;
    color: #25D366;
    cursor: pointer;
    font-size: 18px;
    padding: 8px;
    border-radius: 50%;
    transition: background .2s;
}

.logout-btn:hover {
    background: #1a1a1a;
}

.messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.message {
    display: flex;
    margin-bottom: 4px;
}

.message.sent {
    justify-content: flex-end;
}

.message-bubble {
    max-width: 55%;
    padding: 10px 14px;
    border-radius: 18px;
    word-wrap: break-word;
    font-size: 14px;
    line-height: 1.4;
}

.message.received .message-bubble {
    background: #1f4b3a;
    color: #fff;
}

.message.sent .message-bubble {
    background: #25D366;
    color: #000;
}

.message-time {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
}

.message.sent .message-time {
    justify-content: flex-end;
}

.input-area {
    padding: 12px 16px;
    border-top: 1px solid #333;
    display: flex;
    gap: 8px;
    align-items: flex-end;
}

.input-area input {
    flex: 1;
    padding: 12px 16px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    color: #fff;
    font-family: inherit;
}

.input-area input:focus {
    border-color: #25D366;
}

.input-area input::placeholder {
    color: #666;
}

.input-area button {
    background: #25D366;
    border: none;
    color: #000;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
}

.input-area button:active {
    background: #1fad54;
}

.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #666;
    text-align: center;
}

/* ============ AUTH SCREENS ============ */
.auth-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.auth-screen.active {
    display: flex;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.auth-container {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 50px 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 420px;
    width: 90%;
    text-align: center;
}

.auth-container h1 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.auth-container p {
    color: #666;
    margin-bottom: 24px;
    font-size: 14px;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.auth-form input {
    padding: 14px;
    border: 2px solid #e5e5e5;
    border-radius: 12px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
}

.auth-form input:focus {
    border-color: #667eea;
}

.auth-error {
    color: #e53935;
    font-size: 13px;
    min-height: 18px;
    margin-bottom: 10px;
}

.auth-form button {
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
}

.auth-form button:hover {
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.auth-form button:disabled {
    opacity: 0.7;
}

.auth-toggle {
    margin-top: 16px;
    font-size: 13px;
    color: #666;
}

.auth-toggle a {
    color: #667eea;
    cursor: pointer;
    font-weight: 600;
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #0d0d0d;
}

::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #444;
}

@media (max-width: 768px) {
    .sidebar {
        width: 280px;
    }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="auth-screen active">
<div class="auth-container">
<h1>PE CHETS PRO</h1>
<p>Sign in to your account</p>

<div class="auth-error" id="loginError"></div>

<div class="auth-form">
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button id="loginBtn">Sign In</button>
</div>

<div class="auth-toggle">
Don't have account? <a onclick="showAuth('signup')">Sign Up</a>
</div>
</div>
</div>

<!-- Signup Screen -->
<div id="signupScreen" class="auth-screen">
<div class="auth-container">
<h1>PE CHETS PRO</h1>
<p>Create your account</p>

<div class="auth-error" id="signupError"></div>

<div class="auth-form">
<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPassword" placeholder="Password (6+)">
<input type="password" id="signupConfirm" placeholder="Confirm password">
<button id="signupBtn">Sign Up</button>
</div>

<div class="auth-toggle">
Already have account? <a onclick="showAuth('login')">Sign In</a>
</div>
</div>
</div>

<!-- Main App -->
<div id="appScreen" class="app-container" style="display:none;">

<!-- Sidebar -->
<div class="sidebar">
<div class="sidebar-header">
<h1>Chats</h1>
<button class="menu-btn">⋮</button>
</div>
<input type="text" class="search-box" id="searchBox" placeholder="Search...">
<div class="chats-list" id="chatsList"></div>
</div>

<!-- Chat Section -->
<div class="chat-section">
<div class="chat-header" id="chatHeader" style="display:none;">
<div class="chat-header-left">
<div class="chat-avatar" id="selectedAvatar"></div>
<h2 id="selectedUsername"></h2>
</div>
<div class="chat-header-right">
<button class="logout-btn" id="logoutBtn" title="Logout">🚪</button>
</div>
</div>

<div class="empty-state" id="emptyState">
<p>Select a chat to start messaging</p>
</div>

<div class="messages-container" id="messagesContainer" style="display:none;"></div>

<div class="input-area" id="inputArea" style="display:none;">
<input type="text" id="messageInput" placeholder="Type a message...">
<button onclick="sendMessage()">➤</button>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAW_KbFHcK_8ff7H5A1Vwo9gCrCKQaI02Q",
    authDomain: "pe-chets.firebaseapp.com",
    databaseURL: "https://pe-chets-default-rtdb.firebaseio.com",
    projectId: "pe-chets",
    storageBucket: "pe-chets.firebasestorage.app",
    messagingSenderId: "378141396164",
    appId: "1:378141396164:web:b1b22a5924d32010b5cd91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let currentProfile = null;
let selectedChat = null;
let allUsers = [];

window.showAuth = function(screen) {
    document.getElementById("loginScreen").classList.toggle("active", screen === "login");
    document.getElementById("signupScreen").classList.toggle("active", screen === "signup");
    document.getElementById("loginError").textContent = "";
    document.getElementById("signupError").textContent = "";
};

document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = "";

    if(!email || !password) {
        errorEl.textContent = "Email and password required";
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, email, password);
    } catch(err) {
        errorEl.textContent = err.message;
    }
});

document.getElementById("signupBtn").addEventListener("click", async () => {
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;
    const confirm = document.getElementById("signupConfirm").value;
    const errorEl = document.getElementById("signupError");
    errorEl.textContent = "";

    if(!email || !password || !confirm) {
        errorEl.textContent = "All fields required";
        return;
    }

    if(password.length < 6) {
        errorEl.textContent = "Password min 6 chars";
        return;
    }

    if(password !== confirm) {
        errorEl.textContent = "Passwords don't match";
        return;
    }

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const username = email.split("@")[0];

        await set(ref(db, "users/" + userCredential.user.uid), {
            username: username,
            email: email,
            bio: "PE Chets User",
            createdAt: Date.now()
        });
    } catch(err) {
        errorEl.textContent = err.message;
    }
});

document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth);
});

onAuthStateChanged(auth, async (user) => {
    if(user) {
        currentUser = user;
        const snap = await get(ref(db, "users/" + user.uid));

        if(snap.exists()) {
            currentProfile = snap.val();
            loadApp();
        } else {
            signOut(auth);
        }
    } else {
        document.getElementById("appScreen").style.display = "none";
        document.getElementById("loginScreen").classList.add("active");
        document.getElementById("signupScreen").classList.remove("active");
    }
});

function loadApp() {
    document.getElementById("appScreen").style.display = "flex";
    document.getElementById("loginScreen").classList.remove("active");
    document.getElementById("signupScreen").classList.remove("active");
    loadAllUsers();
}

async function loadAllUsers() {
    const snap = await get(ref(db, "users"));
    allUsers = [];
    
    if(snap.exists()) {
        snap.forEach(child => {
            if(child.key !== currentUser.uid) {
                allUsers.push({
                    uid: child.key,
                    ...child.val()
                });
            }
        });
    }
    
    renderChatsList();
}

function renderChatsList() {
    const list = document.getElementById("chatsList");
    list.innerHTML = "";
    
    allUsers.forEach(user => {
        const item = document.createElement("div");
        item.className = "chat-item";
        if(selectedChat?.uid === user.uid) item.classList.add("active");
        
        const initial = user.username.charAt(0).toUpperCase();
        
        item.innerHTML = `
            <div class="chat-avatar">${initial}</div>
            <div class="chat-info">
                <h3>@${user.username}</h3>
                <p>${user.bio || "No bio"}</p>
            </div>
        `;
        
        item.addEventListener("click", () => selectChat(user));
        list.appendChild(item);
    });
}

function selectChat(user) {
    selectedChat = user;
    renderChatsList();
    
    document.getElementById("chatHeader").style.display = "flex";
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("messagesContainer").style.display = "flex";
    document.getElementById("inputArea").style.display = "flex";
    
    document.getElementById("selectedAvatar").textContent = user.username.charAt(0).toUpperCase();
    document.getElementById("selectedUsername").textContent = "@" + user.username;
    
    loadMessages();
}

function loadMessages() {
    const container = document.getElementById("messagesContainer");
    container.innerHTML = "";
    
    const chatId = [currentUser.uid, selectedChat.uid].sort().join("_");
    
    onValue(ref(db, "chats/" + chatId), (snap) => {
        container.innerHTML = "";
        
        if(snap.exists()) {
            snap.forEach(child => {
                const msg = child.val();
                const div = document.createElement("div");
                div.className = "message " + (msg.from === currentUser.uid ? "sent" : "received");
                
                const time = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                div.innerHTML = `
                    <div>
                        <div class="message-bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                container.appendChild(div);
            });
        }
        
        container.scrollTop = container.scrollHeight;
    });
}

window.sendMessage = async function() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    
    if(!text || !selectedChat) return;
    
    const chatId = [currentUser.uid, selectedChat.uid].sort().join("_");
    
    await push(ref(db, "chats/" + chatId), {
        from: currentUser.uid,
        text: text,
        time: Date.now()
    });
    
    input.value = "";
};

document.getElementById("messageInput").addEventListener("keydown", (e) => {
    if(e.key === "Enter") sendMessage();
});

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

</script>

</body>
</html>
